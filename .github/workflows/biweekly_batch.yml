name: Biweekly LLM Visibility Batch

# Trigger:
# - Lunedì alle 06:00 UTC (08:00 ora italiana legale, 07:00 ora solare)
#   ma SOLO nelle settimane ISO pari → cadenza biweekly (ridurre costi API)
# - Manuale via "Run workflow" dalla UI di GitHub (sempre attivo)
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      repeat:
        description: 'Numero di ripetizioni per (prompt × modello)'
        required: false
        default: '3'

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.parity.outputs.run }}
    steps:
      - id: parity
        run: |
          WEEK=$(date -u +%V)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Trigger manuale — eseguo (settimana ISO $WEEK)"
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ $((10#$WEEK % 2)) -eq 0 ]; then
            echo "Settimana ISO $WEEK pari — eseguo (cadenza biweekly)"
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Settimana ISO $WEEK dispari — skip (cadenza biweekly, prossima run fra 7 giorni)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  run-batch:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      # Scrive su Supabase Postgres (unica fonte di verità letta dal sito).
      # Senza questo, il batch scriverebbe su un SQLite locale invisibile alla dashboard.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Seed DB (idempotente — allinea prompt/competitor dal YAML)
        run: python -m scripts.seed_db

      - name: Run batch with alerts
        run: |
          python -m scripts.run_batch_with_alerts \
            --repeat "${{ github.event.inputs.repeat || '3' }}"

      - name: Upload run summary
        if: always()
        run: |
          python -c "
          from sqlalchemy import select, desc
          from src.storage import get_session, Run, Response
          from sqlalchemy import func
          with get_session() as s:
              r = s.scalars(select(Run).order_by(desc(Run.id))).first()
              if r:
                  n = s.scalar(select(func.count(Response.id)).where(Response.run_id == r.id)) or 0
                  n_cit = s.scalar(select(func.count(Response.id)).where(Response.run_id == r.id, Response.has_target_citation.is_(True))) or 0
                  rate = (n_cit / n) if n else 0
                  print(f'## Run #{r.id}')
                  print(f'- Risposte: {n}')
                  print(f'- Citation rate: {rate:.1%}')
          " >> $GITHUB_STEP_SUMMARY
