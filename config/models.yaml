# LLM Visibility — config modelli con pricing per cost tracking.
# I prezzi sono in USD per 1M token (aggiornati ai listini provider di luglio 2026).
# web_search_price è il costo extra per ricerca web, dove applicabile.
# Se mancano, il calcolo costo userà 0 (sarà comunque consistente, solo sottostimato).
#
# `label` = nome mostrato nella dashboard. Questo file è l'UNICA fonte del registro
# modelli: dopo ogni modifica rigenerare il blocco MODELS nel sito con
#   python -m scripts.gen_models
# (aggiorna docs/index.html tra i marker MODELS:GEN).

- id: perplexity-sonar
  label: Perplexity Sonar
  provider: perplexity
  model: sonar
  web_search: true
  priority: high
  enabled: true
  input_price_per_1m: 1.00     # USD/1M token input
  output_price_per_1m: 1.00    # USD/1M token output
  web_search_price: 0.005      # USD per query

- id: perplexity-sonar-pro
  label: Perplexity Sonar Pro
  provider: perplexity
  model: sonar-pro
  web_search: true
  priority: high
  enabled: true
  input_price_per_1m: 3.00
  output_price_per_1m: 15.00
  web_search_price: 0.005

- id: gpt-4o-search
  label: GPT-5.6 Terra Search
  provider: openai
  model: gpt-5.6-terra
  web_search: true
  priority: high
  enabled: true
  input_price_per_1m: 2.50
  output_price_per_1m: 15.00
  web_search_price: 0.010      # Responses API web_search: ~$10/1k call

- id: gpt-4o-mini-search
  label: GPT-5.6 Luna Search
  provider: openai
  model: gpt-5.6-luna
  web_search: true
  priority: medium
  enabled: false
  input_price_per_1m: 1.00
  output_price_per_1m: 6.00
  web_search_price: 0.010

- id: claude-sonnet-search
  label: Claude Sonnet 5 Search
  provider: anthropic
  model: claude-sonnet-5
  web_search: true
  priority: high
  enabled: true
  input_price_per_1m: 3.00
  output_price_per_1m: 15.00
  web_search_price: 0.010      # $10/1k ricerche web Anthropic

- id: gemini-2-flash-search
  label: Gemini 3.6 Flash Search
  provider: gemini
  model: gemini-3.6-flash
  web_search: true
  priority: high
  enabled: true
  input_price_per_1m: 0.10
  output_price_per_1m: 0.40
  web_search_price: 0.000      # incluso fino a soglie generose

# ---------------------------------------------------------------------
# Modelli chat BASE (senza web search) — misurano la "brand awareness"
# del modello senza accesso al web. Utile per confronto: il modello
# ricorda il brand dai dati di training? Citation rate sarà 0 perché non
# può citare URL, ma il mention rate è il dato interessante.
# ---------------------------------------------------------------------

- id: gpt-4o-chat
  label: GPT-5.6 Terra Chat
  provider: openai
  model: gpt-5.6-terra
  web_search: false
  priority: medium
  enabled: true
  input_price_per_1m: 2.50
  output_price_per_1m: 15.00
  web_search_price: 0.000

- id: claude-sonnet-chat
  label: Claude Sonnet 5 Chat
  provider: anthropic
  model: claude-sonnet-5
  web_search: false
  priority: medium
  enabled: true
  input_price_per_1m: 3.00
  output_price_per_1m: 15.00
  web_search_price: 0.000

- id: gemini-2-flash-chat
  label: Gemini 3.6 Flash Chat
  provider: gemini
  model: gemini-3.6-flash
  web_search: false
  priority: medium
  enabled: true
  input_price_per_1m: 0.10
  output_price_per_1m: 0.40
  web_search_price: 0.000
