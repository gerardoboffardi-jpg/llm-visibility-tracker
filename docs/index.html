<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLM Visibility — Talent Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root{
    --coral:#FF5F00; --coral-dark:#9A3B0E; --coral-soft:#FFF1EC; --coral-border:#FFE0D4;
    --ink:#0F172A; --muted:#64748B; --line:#F1F5F9; --bg:#F8FAFC;
    --green:#16A34A; --orange:#F97316; --slate:#64748B;
  }
  *{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{background:var(--bg);color:var(--ink);margin:0}
  .sidebar{width:248px;background:#fff;border-right:1px solid var(--line);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto}
  .main{margin-left:248px;padding:28px 44px}
  .mlogo{width:18px;height:18px;border-radius:4px;vertical-align:middle;object-fit:contain}
  .resp-md{font-size:.88rem;line-height:1.55;color:#334155;max-height:360px;overflow:auto}
  .resp-md p{margin:0 0 8px}.resp-md ul,.resp-md ol{margin:0 0 8px;padding-left:20px}
  .resp-md li{margin:3px 0}.resp-md h1,.resp-md h2,.resp-md h3{font-size:.96rem;font-weight:600;margin:10px 0 4px}
  .resp-md a{color:var(--coral);text-decoration:underline}.resp-md strong{font-weight:600;color:var(--ink)}
  .resp-md code{background:#F1F5F9;padding:1px 5px;border-radius:4px;font-size:.85em}
  .resp-md table{font-size:.82rem;margin:6px 0}.resp-md th,.resp-md td{padding:4px 8px}
  .infobox{background:var(--coral-soft);border:1px solid var(--coral-border);border-radius:12px;padding:12px 16px;font-size:.86rem;color:var(--coral-dark);margin-bottom:18px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:var(--muted);font-weight:500;font-size:.92rem;cursor:pointer;text-decoration:none;transition:.12s}
  .nav-item:hover{background:var(--coral-soft);color:var(--coral-dark)}
  .nav-item.active{background:var(--coral);color:#fff;font-weight:600}
  .nav-item .ico{font-size:1.1rem;width:22px;text-align:center}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .kpi-value{font-size:2rem;font-weight:700;line-height:1}
  .kpi-label{font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .eyebrow{font-size:.72rem;color:var(--coral);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;font-weight:600;font-size:.86rem;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);transition:.12s}
  .btn:hover{border-color:var(--coral-border);background:var(--coral-soft)}
  .btn-primary{background:var(--coral);color:#fff;border-color:var(--coral)}
  .btn-primary:hover{background:var(--coral-dark);color:#fff}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;padding:10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5;box-shadow:0 1px 0 var(--line)}
  .clickrow{cursor:pointer}.clickrow:hover td{background:var(--coral-soft)}
  td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:#FBFCFE}
  .bar{height:7px;border-radius:99px;background:var(--line);overflow:hidden}
  .bar>span{display:block;height:100%;background:var(--coral)}
  .pill{display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 11px;border-radius:99px;font-size:.76rem;font-weight:600;line-height:1;white-space:nowrap}
  .pill-green{background:#DCFCE7;color:#166534}.pill-orange{background:#FFEDD5;color:#9A3412}
  .pill-slate{background:#F1F5F9;color:#475569}.pill-coral{background:var(--coral-soft);color:var(--coral-dark)}
  .subtab{padding:7px 14px;border-radius:9px;font-weight:600;font-size:.85rem;cursor:pointer;color:var(--muted)}
  .subtab.active{background:var(--coral-soft);color:var(--coral-dark)}
  .resp-text{white-space:pre-wrap;font-size:.86rem;line-height:1.5;color:#334155;max-height:340px;overflow:auto}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:.74rem;border:1px solid var(--line);background:#fff;cursor:pointer}
  .chip.active{background:var(--coral);color:#fff;border-color:var(--coral)}
  input,select,textarea{border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:.88rem;width:100%;background:#fff}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--coral)}
  .muted{color:var(--muted)}
  .spinner{width:34px;height:34px;border:3px solid var(--coral-soft);border-top-color:var(--coral);border-radius:50%;animation:sp 1s linear infinite;margin:40px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hscroll{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 2px 12px;scroll-behavior:smooth}
  .hscroll::-webkit-scrollbar{height:8px}.hscroll::-webkit-scrollbar-thumb{background:var(--coral-border);border-radius:99px}
  .hcard{flex:0 0 100%;min-width:100%;max-width:100%;scroll-snap-align:start}
  .sbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:1rem;line-height:1;color:var(--ink)}
  .sbtn:hover{background:var(--coral-soft);border-color:var(--coral-border)}
  .hidden{display:none}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div style="padding:6px 8px 18px">
    <img src="https://business.talentgarden.com/wp-content/uploads/2026/03/cropped-tag-logo-hor.png" alt="Talent Garden" style="height:26px;width:auto;display:block;margin-bottom:10px" />
    <div style="font-weight:700;font-size:.95rem;line-height:1">LLM Visibility</div>
    <div style="font-size:.72rem;color:var(--muted)">Brand visibility sugli LLM</div>
  </div>
  <div id="nav"></div>
  <div style="margin-top:auto;padding:12px 8px 4px;border-top:1px solid var(--line);font-size:.72rem;color:var(--muted)">
    <div id="lastLoad">—</div>
    <button class="btn" style="margin-top:8px;width:100%;justify-content:center" onclick="loadAll(true)">↻ Aggiorna dati</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div id="loading"><div class="spinner"></div><p class="muted" style="text-align:center">Carico i dati da Supabase…</p></div>
  <div id="content" class="hidden"></div>
</main>

<script>
// ============ CONFIG ============
const SUPABASE_URL = "https://qbcmnqfnaixbhbuwfgdf.supabase.co";
const SUPABASE_KEY = "sb_publishable_faBNmujDvlzyKB5b6SydgA_kOnEvTU5";
// Webhook n8n unico: il sito posta {action, ...}; n8n inoltra a GitHub Actions
// (repository_dispatch), il dispatcher Python esegue l'azione e scrive su Supabase.
const N8N_URL = "https://talentgarden.app.n8n.cloud/webhook/llmv-visibility";
const N8N_PDF_URL = "https://talentgarden.app.n8n.cloud/webhook/llmv-generate-pdf";
const N8N = { run:N8N_URL, runBatch:N8N_URL, create:N8N_URL, remove:N8N_URL, generate:N8N_URL, seoPlan:N8N_URL, pdf:N8N_PDF_URL };
const TARGET = { name:"Talent Garden", domain:"talentgarden.com" };
// Registro modelli (mirror di config/models.yaml) per search/chat + pricing USD per 1M token
const MODELS = {
  "perplexity-sonar":      {label:"Perplexity Sonar",      type:"search", in:1.00, out:1.00,  web:0.005},
  "perplexity-sonar-pro":  {label:"Perplexity Sonar Pro",  type:"search", in:3.00, out:15.00, web:0.005},
  "gpt-4o-search":         {label:"GPT-4o Search",         type:"search", in:2.50, out:10.00, web:0.030},
  "gpt-4o-mini-search":    {label:"GPT-4o mini Search",    type:"search", in:0.15, out:0.60,  web:0.025},
  "claude-sonnet-search":  {label:"Claude Sonnet Search",  type:"search", in:3.00, out:15.00, web:0.010},
  "gemini-2-flash-search": {label:"Gemini 2.5 Flash Search",type:"search",in:0.10, out:0.40,  web:0.000},
  "gpt-4o-chat":           {label:"GPT-4o Chat",           type:"chat",   in:2.50, out:10.00, web:0},
  "claude-sonnet-chat":    {label:"Claude Sonnet Chat",    type:"chat",   in:3.00, out:15.00, web:0},
  "gemini-2-flash-chat":   {label:"Gemini 2.5 Flash Chat", type:"chat",   in:0.10, out:0.40,  web:0},
};
const modelType = id => (MODELS[id]?.type) || "search";
const modelLabel = id => (MODELS[id]?.label) || id;
function estCost(r){
  const m = MODELS[r.model_id]; if(!m||!r.tokens) return 0;
  const t = r.tokens;
  return (t*0.7*m.in + t*0.3*m.out)/1e6 + (m.type==="search"? m.web : 0);
}

// ============ STATE ============
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let DATA = { prompts:[], responses:[], competitors:[] };
const NAV = [
  ["overview","Overview","📊"],["prompts","Prompts","📝"],["risposte","Risposte","💬"],
  ["detail","Prompt Detail","🔬"],["models","Models","🤖"],["citations","Citations","🔗"],
  ["reco","Recommendations","🎯"],["costi","Costi & Run","💰"],
];

// ============ HELPERS ============
const pct = x => (x==null? "—" : (x*100).toFixed(0)+"%");
const pct1 = x => (x==null? "—" : (x*100).toFixed(1)+"%");
const esc = s => (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtDate = s => s? new Date(s).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "—";
function bar(v){ return `<div class="bar"><span style="width:${Math.round((v||0)*100)}%"></span></div>`; }
function modelLogo(id){ id=id||""; let d="openai.com";
  if(id.includes("perplexity"))d="perplexity.ai"; else if(id.includes("claude"))d="anthropic.com";
  else if(id.includes("gemini"))d="gemini.google.com"; else if(id.includes("gpt"))d="openai.com";
  return `https://www.google.com/s2/favicons?sz=64&domain=${d}`; }
function modelBadge(id){ return `<img class="mlogo" src="${modelLogo(id)}" alt=""> ${esc(modelLabel(id))}`; }
function providerKey(id){ id=id||""; if(id.includes("perplexity"))return"perplexity"; if(id.includes("claude"))return"claude"; if(id.includes("gemini"))return"gemini"; return"openai"; }
const PROVIDER_STYLE={
  gemini:"background:#DBEAFE;color:#1D4ED8",      // azzurro chiaro (Gemini)
  claude:"background:#F3E2D3;color:#8A4B2A",      // marrone chiaro (Claude/Anthropic)
  openai:"background:#D8F3E8;color:#0F766E",      // verde acqua (OpenAI)
  perplexity:"background:#CFF3F1;color:#0E7490",  // teal (Perplexity)
};
function modelChip(id){ return `<span class="pill" style="${PROVIDER_STYLE[providerKey(id)]}"><img class="mlogo" src="${modelLogo(id)}" alt="">${esc(modelLabel(id))}</span>`; }
function mdText(t){ try{ return DOMPurify.sanitize(marked.parse(t||"")); }catch(e){ return esc(t||""); } }

// ============ DATA LOAD ============
async function loadAll(force){
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("content").classList.add("hidden");
  const [p, r, c] = await Promise.all([
    sb.from("prompts").select("*").order("id"),
    sb.from("responses").select("*, prompts(id,text,category,geo,intent), citations(*), mentions(*)").order("created_at",{ascending:false}),
    sb.from("competitor_domains").select("*"),
  ]);
  if(p.error||r.error){ document.getElementById("loading").innerHTML = `<div class="card" style="border-color:#FCA5A5"><b>Errore caricamento dati</b><br><span class="muted">${esc((p.error||r.error).message)}</span></div>`; return; }
  DATA.prompts = p.data||[]; DATA.responses = r.data||[]; DATA.competitors = c.data||[];
  document.getElementById("lastLoad").textContent = "Aggiornato: "+new Date().toLocaleTimeString("it-IT");
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("content").classList.remove("hidden");
  route();
}

// ============ AGGREGAZIONI ============
function globalKpis(){
  const R = DATA.responses, n = R.length;
  const nCit = R.filter(x=>x.has_target_citation).length;
  const nMen = R.filter(x=>x.has_target_mention).length;
  const allCits = R.flatMap(x=>x.citations||[]);
  const nTargetCit = allCits.filter(x=>x.is_target_domain).length;
  const citation_rate = n? nCit/n : 0;
  const mention_rate = n? nMen/n : 0;
  return {
    n_prompts: DATA.prompts.length, n_responses:n,
    n_runs: new Set(R.map(x=>x.run_id)).size,
    citation_rate, mention_rate,
    share_of_citations: allCits.length? nTargetCit/allCits.length : 0,
    citation_gap: Math.max(0, mention_rate - citation_rate),
    n_total_citations: allCits.length,
  };
}
function perPrompt(){
  const byId = {};
  DATA.responses.forEach(r=>{ (byId[r.prompt_id] ||= []).push(r); });
  return DATA.prompts.map(p=>{
    const rs = byId[p.id]||[]; const n = rs.length;
    return {
      id:p.id, text:p.text, category:p.category||"", geo:p.geo||"", intent:p.intent||"",
      active:p.is_active, n_resp:n, n_models:new Set(rs.map(x=>x.model_id)).size,
      citation_rate: n? rs.filter(x=>x.has_target_citation).length/n : null,
      mention_rate: n? rs.filter(x=>x.has_target_mention).length/n : null,
      last: rs.reduce((a,x)=> !a||x.created_at>a? x.created_at:a, null),
    };
  });
}
function perModel(){
  const by = {};
  DATA.responses.forEach(r=>{ (by[r.model_id] ||= []).push(r); });
  return Object.entries(by).map(([id,rs])=>{
    const n = rs.length;
    return { model_id:id, label:modelLabel(id), type:modelType(id), n,
      citation_rate: rs.filter(x=>x.has_target_citation).length/n,
      mention_rate: rs.filter(x=>x.has_target_mention).length/n,
      avg_cit: rs.reduce((a,x)=>a+(x.total_citations||0),0)/n,
      avg_lat: rs.reduce((a,x)=>a+(x.latency_ms||0),0)/n };
  }).sort((a,b)=>b.n-a.n);
}
function domainMix(){
  const cits = DATA.responses.flatMap(x=>x.citations||[]);
  let t=0,co=0,o=0;
  cits.forEach(c=> c.is_target_domain? t++ : c.is_competitor_domain? co++ : o++);
  return {target:t, competitor:co, other:o, total:cits.length};
}

// ============ RENDER: shell ============
function renderNav(active){
  document.getElementById("nav").innerHTML = NAV.map(([id,label,ico])=>
    `<a class="nav-item ${id===active?'active':''}" href="#/${id}"><span class="ico">${ico}</span>${label}</a>`).join("");
}
function sectionHeader(eyebrow,title,sub){
  return `<div style="margin:6px 0 18px"><div class="eyebrow">${eyebrow}</div>
    <div style="font-size:1.4rem;font-weight:700">${title}</div>
    ${sub?`<div class="muted" style="font-size:.9rem;margin-top:2px">${sub}</div>`:""}</div>`;
}

// ============ TABS ============
function tabOverview(){
  const k = globalKpis();
  const c = document.getElementById("content");
  c.innerHTML = `
   <div style="background:linear-gradient(135deg,#fff,#FFF7F3);border:1px solid var(--coral-border);border-radius:18px;padding:34px 40px;margin-bottom:22px">
     <div class="eyebrow" style="margin-bottom:10px">LLM Visibility · Talent Garden</div>
     <h1 style="font-size:clamp(2.1rem,3.4vw,3.1rem);font-weight:800;margin:0 0 10px;line-height:1.08">Quanto è visibile Talent Garden nelle risposte degli <span style="color:var(--coral)">LLM</span>?</h1>
     <p class="muted" style="font-size:1.02rem;line-height:1.5;max-width:720px">Monitoriamo se <b>ChatGPT, Perplexity, Claude e Gemini</b> citano <b>talentgarden.com</b> quando rispondono a domande reali su coworking, formazione e innovation.</p>
   </div>
   <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px">
     ${kpiCard("⭐ Citation rate", pct1(k.citation_rate), k.n_responses+" risposte · "+k.n_prompts+" prompt", "var(--coral)")}
     ${kpiCard("💬 Mention rate", pct1(k.mention_rate), "Brand citato nel testo")}
     ${kpiCard("📊 Share of citations", pct1(k.share_of_citations), "Su "+k.n_total_citations+" citazioni")}
     ${kpiCard("⚠️ Citation gap", pct1(k.citation_gap), "Opportunità SEO", "var(--orange)")}
   </div>
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
     <div class="card">${sectionHeader("Citazioni","Domain mix","Target vs competitor vs altri")}<div style="position:relative;height:240px"><canvas id="chDomain"></canvas></div></div>
     <div class="card">${sectionHeader("Andamento","Trend citation rate","Per giorno")}<div style="position:relative;height:240px"><canvas id="chTrend"></canvas></div></div>
   </div>`;
  drawDomain(); drawTrend();
}
function kpiCard(label,val,hint,color){
  return `<div class="card"><div class="kpi-label">${label}</div>
    <div class="kpi-value" style="color:${color||'var(--ink)'};margin:8px 0 4px">${val}</div>
    <div class="muted" style="font-size:.8rem">${hint||""}</div></div>`;
}
let _charts={};
function drawDomain(){
  const d=domainMix(); const ctx=document.getElementById("chDomain"); if(!ctx)return;
  _charts.domain?.destroy();
  _charts.domain=new Chart(ctx,{type:"doughnut",data:{labels:["Target","Competitor","Altri"],
    datasets:[{data:[d.target,d.competitor,d.other],backgroundColor:["#16A34A","#F97316","#CBD5E1"]}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"58%",plugins:{legend:{position:"bottom"}}}});
}
function drawTrend(){
  const by={}; DATA.responses.forEach(r=>{const day=(r.created_at||"").slice(0,10); if(!day)return;(by[day]??={n:0,c:0});by[day].n++; if(r.has_target_citation)by[day].c++;});
  const days=Object.keys(by).sort(); const ctx=document.getElementById("chTrend"); if(!ctx)return;
  _charts.trend?.destroy();
  _charts.trend=new Chart(ctx,{type:"line",data:{labels:days,datasets:[{label:"Citation rate",
    data:days.map(d=>by[d].c/by[d].n),borderColor:"#FF5F00",backgroundColor:"#FFE0D4",fill:true,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:1,ticks:{callback:v=>(v*100)+"%"}}},plugins:{legend:{display:false}}}});
}

function tabPrompts(){
  const sub = (location.hash.split("?")[1]||"").includes("add") ? "add":"list";
  const rows = perPrompt();
  const c = document.getElementById("content");
  c.innerHTML = sectionHeader("Gestione","Prompts", rows.length+" prompt monitorati") + `
   <div style="display:flex;gap:8px;margin-bottom:16px">
     <div class="subtab ${sub==='list'?'active':''}" onclick="location.hash='#/prompts'">Lista</div>
     <div class="subtab ${sub==='add'?'active':''}" onclick="location.hash='#/prompts?add'">Aggiungi / Genera</div>
   </div>
   <div id="promptsBody"></div>`;
  document.getElementById("promptsBody").innerHTML = sub==="add"? promptsAdd() : promptsList(rows);
}
function promptsList(rows){
  return `
  <div class="card" style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn" onclick="toggleAll(true)">Seleziona tutti</button>
    <button class="btn" onclick="toggleAll(false)">Deseleziona</button>
    <span style="flex:1"></span>
    <label class="muted" style="font-size:.82rem;display:flex;align-items:center;gap:6px">Ripetizioni <input id="repeatN" type="number" value="1" min="1" max="10" style="width:64px"></label>
    <button class="btn btn-primary" onclick="actionRun()">▶️ Rilancia selezionati</button>
    <button class="btn" style="color:#B91C1C" onclick="actionDelete()">🗑 Elimina selezionati</button>
  </div>
  <div class="card" style="overflow:auto;max-height:560px">
   <table><thead><tr>
     <th style="width:30px"></th><th>ID</th><th>Prompt</th><th>Cat.</th><th># risp</th>
     <th>Citation</th><th>Mention</th><th>Ultima run</th>
   </tr></thead><tbody>
   ${rows.map(p=>`<tr class="clickrow" onclick="if(event.target.type!=='checkbox')location.hash='#/detail?p=${p.id}'" title="Apri il dettaglio del prompt">
     <td onclick="event.stopPropagation()"><input type="checkbox" class="selp" value="${p.id}" style="width:auto"></td>
     <td class="muted">#${p.id}</td>
     <td style="font-weight:500">${esc(p.text)}</td>
     <td><span class="pill pill-slate">${esc(p.category)||"—"}</span></td>
     <td>${p.n_resp}</td>
     <td style="min-width:90px">${pct(p.citation_rate)} ${bar(p.citation_rate)}</td>
     <td style="min-width:90px">${pct(p.mention_rate)} ${bar(p.mention_rate)}</td>
     <td class="muted" style="font-size:.78rem">${fmtDate(p.last)}</td>
   </tr>`).join("")}
   </tbody></table>

async function callN8n(url, body, label){
  if(!url){ alert(`⚙️ Webhook n8n non ancora configurato per: ${label}.\nQuesta azione sarà attiva quando colleghiamo n8n.`); return false; }
  try{
    const res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok) throw new Error("HTTP "+res.status);
    return true;
  }catch(e){ alert("Errore chiamando n8n: "+e.message); return false; }
}

window.actionGeneratePdf = async ()=>{

  const res = document.getElementById("genResult");
  res.innerHTML = '<span class="muted">📄 Carico il PDF su n8n e genero i prompt con Claude (~30-60s)…</span>';
  try {
    const fd = new FormData(); fd.append("file", f);
    const r = await fetch(N8N.pdf, { method:"POST", body: fd });

    if(!prompts.length){ res.innerHTML='<span class="muted">⚠️ Nessun prompt generato (PDF potrebbe essere scansionato/senza testo).</span>'; return; }
    window._pdfPrompts = prompts;
    res.innerHTML = pdfReviewHtml(prompts);
  } catch(e){ res.innerHTML = '<span style="color:#B91C1C">Errore: '+esc(e.message)+'</span>'; }
};
function pdfReviewHtml(prompts){
  return `<div style="margin-top:8px"><div style="font-weight:600;margin-bottom:6px">🪄 ${prompts.length} prompt generati — scegli quali importare</div>
    <div style="max-height:340px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 10px;margin-bottom:10px">
      ${prompts.map((p,i)=>`<label style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:.88rem;cursor:pointer">
        <input type="checkbox" class="pdfp" data-i="${i}" checked style="width:auto;margin-top:3px">
        <span style="flex:1"><b>${esc(p.text||"")}</b>
          ${p.category?`<span class="pill pill-slate" style="font-size:.66rem;margin-left:6px">${esc(p.category)}</span>`:""}
          ${p.geo?`<span class="pill pill-slate" style="font-size:.66rem;margin-left:4px">${esc(p.geo)}</span>`:""}
          ${p.intent?`<span class="pill pill-slate" style="font-size:.66rem;margin-left:4px">${esc(p.intent)}</span>`:""}</span>
      </label>`).join("")}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn" onclick="document.querySelectorAll('.pdfp').forEach(c=>c.checked=true)">Seleziona tutti</button>
      <button class="btn" onclick="document.querySelectorAll('.pdfp').forEach(c=>c.checked=false)">Deseleziona</button>
      <span style="flex:1"></span>
      <button class="btn btn-primary" onclick="actionImportPdfPrompts()">📥 Importa selezionati</button>
    </div>
  </div>`;
}
window.actionImportPdfPrompts = async ()=>{
  const sel = [...document.querySelectorAll('.pdfp:checked')].map(c=>window._pdfPrompts[+c.dataset.i]);
  if(!sel.length) return alert("Seleziona almeno un prompt.");
  const res = document.getElementById("genResult");
  if(await callN8n(N8N.runBatch,{action:"bulk-create", prompts:sel}, "Importa PDF")) {
    res.innerHTML = '<span style="color:#047857">✅ Importazione richiesta per '+sel.length+' prompt. Tra ~1 min usa ↻ Aggiorna dati.</span>';
  }
};

// ============ ROUTER ============
function route(){
  const id = (location.hash.replace("#/","").split("?")[0]) || "overview";
  renderNav(id);
  ({overview:tabOverview,prompts:tabPrompts,risposte:tabRisposte,detail:tabDetail,
    models:tabModels,citations:tabCitations,reco:tabReco,costi:tabCosti}[id]||tabOverview)();
}
window.addEventListener("hashchange", ()=>{ if(DATA.prompts.length||DATA.responses.length) route(); });
loadAll();
</script>
</body>
